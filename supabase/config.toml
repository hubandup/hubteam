# Cron jobs for automatic notifications
[edge_runtime.cron]
enabled = true

[[edge_runtime.cron.jobs]]
name = "check-deadlines"
schedule = "0 */6 * * *"  # Every 6 hours
function = "check-deadlines"

[[edge_runtime.cron.jobs]]
name = "check-client-deadlines"
schedule = "0 8 * * *"  # Every day at 8 AM
function = "check-client-deadlines"