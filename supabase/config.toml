# Cron jobs for automatic notifications
[edge_runtime.cron]
enabled = true

[[edge_runtime.cron.jobs]]
name = "check-deadlines"
schedule = "0 */6 * * *"  # Every 6 hours
function = "check-deadlines"

[[edge_runtime.cron.jobs]]
name = "check-client-deadlines"
schedule = "0 * * * *"  # Every hour
function = "check-client-deadlines"

[[edge_runtime.cron.jobs]]
name = "sync-facturation-pro-clients"
schedule = "0 */6 * * *"  # Every 6 hours
function = "sync-facturation-pro-clients"

[[edge_runtime.cron.jobs]]
name = "sync-facturation-pro-invoices"
schedule = "0 */6 * * *"  # Every 6 hours
function = "sync-facturation-pro-invoices"

[[edge_runtime.cron.jobs]]
name = "check-facturation-pro-quotes"
